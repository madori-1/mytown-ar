<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイタウンAR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

    :root {
      --sky: #6EC6F5;
      --grass: #7ED66A;
      --sun: #FFD93D;
      --road: #A0A0B0;
      --ui-bg: rgba(255,255,255,0.92);
      --ui-shadow: 0 4px 24px rgba(80,120,200,0.18);
      --accent: #FF7043;
      --text: #2D3A4A;
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'M PLUS Rounded 1c', 'Nunito', sans-serif;
      background: linear-gradient(160deg, var(--sky) 0%, #b3e5fc 60%, var(--grass) 100%);
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px 10px;
      position: relative;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--sun);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 3px 12px rgba(255,180,0,0.4);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .logo-text {
      font-size: 22px;
      font-weight: 900;
      color: white;
      text-shadow: 0 2px 8px rgba(60,120,200,0.3);
      letter-spacing: 0.5px;
    }

    .logo-text span {
      color: var(--sun);
    }

    .header-badge {
      background: white;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 99px;
      box-shadow: var(--ui-shadow);
      letter-spacing: 0.5px;
    }

    /* ===== AR VIEWPORT ===== */
    .ar-container {
      position: relative;
      margin: 0 16px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(60,100,200,0.2);
      background: #1a2a3a;
      aspect-ratio: 4/3;
      max-height: 42vh;
    }

    #ar-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none; /* カメラOFF時は非表示 */
      z-index: 0;
    }

    #ar-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: linear-gradient(180deg, #1a2a4a 0%, #2d4a2d 80%, #3a5a3a 100%);
      z-index: 0;
    }

    .ar-camera-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      color: white;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 99px;
      padding: 7px 14px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    .ar-camera-btn.active {
      background: rgba(255,112,67,0.8);
      border-color: rgba(255,255,255,0.6);
    }
    .ar-camera-btn:hover { transform: scale(1.05); }

    .ar-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Grid animation */
    .ar-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(110,198,245,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(110,198,245,0.15) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridPulse 4s ease-in-out infinite;
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .ar-scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--sky), transparent);
      animation: scan 2.5s ease-in-out infinite;
      opacity: 0.7;
    }

    @keyframes scan {
      0% { top: 0%; }
      100% { top: 100%; }
    }

    .ar-corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--sky);
      border-style: solid;
      opacity: 0.8;
    }
    .ar-corner.tl { top: 14px; left: 14px; border-width: 3px 0 0 3px; }
    .ar-corner.tr { top: 14px; right: 14px; border-width: 3px 3px 0 0; }
    .ar-corner.bl { bottom: 14px; left: 14px; border-width: 0 0 3px 3px; }
    .ar-corner.br { bottom: 14px; right: 14px; border-width: 0 3px 3px 0; }

    /* Placed objects in AR view */
    .ar-placed-objects {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: all;
    }

    .ar-object {
      position: absolute;
      font-size: 32px;
      cursor: pointer;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
      user-select: none;
      transition: transform 0.15s;
    }

    .ar-object:hover { transform: scale(1.15); }

    @keyframes popIn {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .ar-status {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 18px;
      border-radius: 99px;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    /* ===== OBJECT PALETTE ===== */
    .palette-section {
      margin: 16px 16px 0;
    }

    .section-label {
      font-size: 13px;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
      margin-bottom: 10px;
      padding-left: 4px;
      letter-spacing: 0.5px;
    }

    .palette-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    .palette-scroll::-webkit-scrollbar { display: none; }

    .palette-item {
      flex-shrink: 0;
      background: var(--ui-bg);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      box-shadow: var(--ui-shadow);
      border: 3px solid transparent;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      min-width: 72px;
    }

    .palette-item:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 28px rgba(80,120,200,0.25);
    }

    .palette-item.selected {
      border-color: var(--accent);
      background: #fff8f6;
      transform: translateY(-4px) scale(1.08);
      box-shadow: 0 8px 28px rgba(255,112,67,0.3);
    }

    .palette-item .obj-icon {
      font-size: 32px;
      line-height: 1;
    }

    .palette-item .obj-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }

    /* ===== ACTION BUTTONS ===== */
    .actions {
      display: flex;
      gap: 10px;
      margin: 14px 16px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.18s;
      box-shadow: var(--ui-shadow);
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #ff5722);
      color: white;
      box-shadow: 0 4px 18px rgba(255,112,67,0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(255,112,67,0.5);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: var(--ui-bg);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: white;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef5350, #c62828);
      color: white;
      flex: 0 0 auto;
      padding: 14px 18px;
    }

    /* ===== OBJECT COUNT BADGE ===== */
    .count-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--ui-bg);
      border-radius: 99px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      box-shadow: var(--ui-shadow);
      margin: 0 16px 10px;
    }

    .count-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--grass);
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== INSTRUCTIONS CARD ===== */
    .instructions {
      margin: 0 16px 20px;
      background: var(--ui-bg);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--ui-shadow);
    }

    .instructions-title {
      font-size: 13px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .step-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #556;
    }

    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--sky);
      color: white;
      font-size: 11px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ===== GALLERY BUTTON ===== */
    .gallery-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 16px 10px;
      background: linear-gradient(135deg, #26a69a, #00695c);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 13px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(38,166,154,0.4);
      transition: all 0.18s;
      width: calc(100% - 32px);
      justify-content: center;
    }
    .gallery-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(38,166,154,0.5); }
    .gallery-btn:active { transform: scale(0.97); }

    /* ===== SUBMIT MODAL ===== */
    .submit-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20,30,50,0.75);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(6px);
      padding: 20px;
    }
    .submit-modal-overlay.open { opacity: 1; pointer-events: all; }

    .submit-modal {
      background: white;
      border-radius: 28px;
      width: 100%;
      max-width: 400px;
      padding: 28px 24px;
      transform: scale(0.9);
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .submit-modal-overlay.open .submit-modal { transform: scale(1); }

    .submit-modal-title {
      font-size: 18px;
      font-weight: 900;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
    }
    .submit-modal-sub {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-bottom: 20px;
    }

    .screenshot-preview-wrap {
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 3px solid #e0e0e0;
      background: #f5f5f5;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #submit-preview-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name-input-wrap {
      margin-bottom: 14px;
    }
    .name-input-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      display: block;
    }
    #author-name-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    #author-name-input:focus { border-color: #26a69a; }

    /* ===== GALLERY MODAL ===== */
    .gallery-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,20,40,0.85);
      z-index: 300;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(8px);
    }
    .gallery-modal-overlay.open { opacity: 1; pointer-events: all; }

    .gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      flex-shrink: 0;
    }
    .gallery-title {
      font-size: 18px;
      font-weight: 900;
      color: white;
    }
    .gallery-close-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s;
    }
    .gallery-close-btn:hover { background: rgba(255,255,255,0.25); }

    .gallery-count {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      padding: 0 20px 12px;
      flex-shrink: 0;
    }

    .gallery-grid {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 24px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      align-content: start;
    }

    .gallery-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      animation: cardIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes cardIn {
      0% { transform: scale(0.8) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .gallery-card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #f0f0f0;
    }

    .gallery-card-footer {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .gallery-card-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .gallery-card-like {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 3px;
      color: #aaa;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      transition: transform 0.2s;
      padding: 4px;
      border-radius: 8px;
    }
    .gallery-card-like:hover { transform: scale(1.2); }
    .gallery-card-like.liked { color: #e53935; }

    .gallery-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      font-weight: 700;
    }

    .gallery-loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.6);
      font-size: 24px;
    }

    /* ===== DRAW BUTTON ===== */
    .draw-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 16px 14px;
      background: linear-gradient(135deg, #ab47bc, #7b1fa2);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 13px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(171,71,188,0.4);
      transition: all 0.18s;
      width: calc(100% - 32px);
      justify-content: center;
    }
    .draw-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(171,71,188,0.5); }
    .draw-btn:active { transform: scale(0.97); }

    /* ===== MODAL OVERLAY ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20,30,50,0.75);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-sheet {
      background: white;
      border-radius: 28px 28px 0 0;
      width: 100%;
      max-width: 520px;
      padding: 20px 20px 32px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: #ddd;
      border-radius: 99px;
      margin: 0 auto 18px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 16px;
      text-align: center;
    }

    /* ===== TABS IN MODAL ===== */
    .modal-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .modal-tab {
      flex: 1;
      padding: 10px;
      border: 2px solid #eee;
      border-radius: 14px;
      background: #fafafa;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: #888;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }
    .modal-tab.active {
      border-color: #ab47bc;
      background: #f3e5f5;
      color: #7b1fa2;
    }

    .modal-panel { display: none; }
    .modal-panel.active { display: block; }

    /* ===== DRAWING CANVAS ===== */
    #draw-canvas {
      border-radius: 16px;
      border: 3px solid #e0e0e0;
      touch-action: none;
      display: block;
      width: 100%;
      cursor: crosshair;
      background: white;
    }

    .draw-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .color-btn.active { border-color: var(--text); transform: scale(1.2); }
    .color-btn:hover { transform: scale(1.1); }

    .size-btn {
      background: #f5f5f5;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
    }
    .size-btn.active { background: #7b1fa2; color: white; border-color: #7b1fa2; }

    .draw-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    /* ===== CAMERA PANEL ===== */
    #camera-video {
      width: 100%;
      border-radius: 16px;
      background: #1a2a3a;
      display: block;
      max-height: 200px;
      object-fit: cover;
    }

    .camera-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    /* ===== PREVIEW PANEL ===== */
    .preview-area {
      text-align: center;
      padding: 10px 0;
    }

    #preview-canvas {
      border-radius: 16px;
      border: 3px dashed #ab47bc;
      max-width: 100%;
      background: repeating-conic-gradient(#f0f0f0 0% 25%, white 0% 50%) 0 0 / 16px 16px;
    }

    .preview-hint {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }

    /* ===== TOAST NOTIFICATION ===== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #2D3A4A;
      color: white;
      padding: 12px 24px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
      z-index: 999;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ===== THEME TABS ===== */
    .theme-tabs {
      display: flex;
      gap: 8px;
      margin: 0 16px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .theme-tabs::-webkit-scrollbar { display: none; }

    .theme-tab {
      flex-shrink: 0;

    .theme-tab.active {
      background: white;
      color: var(--text);
      box-shadow: var(--ui-shadow);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🏙️</div>

    <div class="ar-overlay">

      <div class="ar-corner bl"></div>
      <div class="ar-corner br"></div>

      <div class="ar-status" id="ar-status">📷 カメラをONにしよう</div>

  <!-- OBJECT COUNT -->

  <!-- GALLERY BUTTON (Phase 3) -->

  <!-- SUBMIT MODAL -->
  <div class="submit-modal-overlay" id="submit-modal">

  <!-- THEME TABS -->
  <div class="theme-tabs">

  <!-- PALETTE -->

  <div class="actions">
    <button class="btn btn-primary" onclick="takeScreenshot()">
      📸 さつえい
    </button>
    <button class="btn btn-secondary" onclick="toggleMode()">
      🔄 <span id="mode-label">どかす</span>
    </button>
    <button class="btn btn-danger" onclick="clearAll()">
      🗑️
    </button>
  </div>

  <!-- INSTRUCTIONS -->
  <div class="instructions">
    <div class="instructions-title">📖 あそびかた</div>
    <div class="step-list">
      <div class="step">

      </div>
      <div class="step">
        <div class="step-num">3</div>
        <span>ARがめんをタップしておこう！</span>
      </div>
      <div class="step">
        <div class="step-num">✏️</div>
        <span>「じぶんでかく」ボタンでえをかいてARにおける！</span>
      </div>
      <div class="step">
        <div class="step-num">🖼️</div>
        <span>さつえいしてなまえをいれたらクラスにとうこう！</span>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

<script>
  // ========================================
  // DATA
  // ========================================
  const themes = {
    town: [
      { icon: '🏠', label: 'いえ' },
      { icon: '🏢', label: 'ビル' },
      { icon: '🏫', label: 'がっこう' },
      { icon: '🏪', label: 'おみせ' },
      { icon: '🚗', label: 'くるま' },
      { icon: '🚌', label: 'バス' },
      { icon: '🌳', label: 'き' },
      { icon: '🌸', label: 'はな' },
      { icon: '⛲', label: 'ふんすい' },
      { icon: '🛣️', label: 'みち' },
      { icon: '🏦', label: 'ぎんこう' },
      { icon: '🚦', label: 'しんごう' },
    ],
    nature: [
      { icon: '🌲', label: 'もみの木' },
      { icon: '🌋', label: 'かざん' },
      { icon: '🏔️', label: 'やま' },
      { icon: '🌊', label: 'うみ' },
      { icon: '🦁', label: 'ライオン' },
      { icon: '🐘', label: 'ぞう' },
      { icon: '🦒', label: 'きりん' },
      { icon: '🌻', label: 'ひまわり' },
      { icon: '🍄', label: 'きのこ' },
      { icon: '🌈', label: 'にじ' },
      { icon: '☀️', label: 'たいよう' },
      { icon: '🌙', label: 'つき' },
    ],
    space: [
      { icon: '🚀', label: 'ロケット' },
      { icon: '🛸', label: 'UFO' },
      { icon: '🪐', label: 'わくせい' },
      { icon: '⭐', label: 'ほし' },
      { icon: '🌙', label: 'つき' },
      { icon: '👽', label: 'うちゅうじん' },
      { icon: '🤖', label: 'ロボット' },
      { icon: '🔭', label: 'ぼうえんきょう' },
      { icon: '💫', label: 'りゅうせい' },
      { icon: '🌌', label: 'ぎんが' },
      { icon: '🛰️', label: 'えいせい' },
      { icon: '☄️', label: 'すいせい' },
    ],
  };

  // ========================================
  // STATE
  // ========================================
  let selectedItem = null;
  let placedObjects = [];
  let removeMode = false;
  let currentTheme = 'town';
  let objectIdCounter = 0;

  // ========================================
  // PALETTE RENDER
  // ========================================
  function renderPalette(theme) {
    const palette = document.getElementById('palette');
    palette.innerHTML = '';
    themes[theme].forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'palette-item';
      el.innerHTML = `<div class="obj-icon">${item.icon}</div><div class="obj-label">${item.label}</div>`;
      el.addEventListener('click', () => selectItem(item, el));
      palette.appendChild(el);
    });
    selectedItem = null;
  }

  function selectItem(item, el) {
    selectedItem = item;
    document.querySelectorAll('.palette-item').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    updateStatus(`${item.icon} ${item.label} をえらんだ！ARがめんをタップしておこう`);
  }

  // ========================================
  // THEME
  // ========================================
  function setTheme(theme, btn) {
    currentTheme = theme;
    document.querySelectorAll('.theme-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderPalette(theme);
    selectedItem = null;
    showToast(`${btn.textContent} テーマにかえたよ！`);
  }

  // ========================================
  // AR CANVAS CLICK → PLACE OBJECT
  // ========================================
  const arContainer = document.getElementById('ar-container');
  arContainer.addEventListener('click', (e) => {
    if (e.target.classList.contains('ar-object')) return;

    if (removeMode) {
      showToast('どかしたいオブジェクトをタップしてね');
      return;
    }

    if (!selectedItem) {
      showToast('まずおきたいものをえらんでね！');
      return;
    }

    const rect = arContainer.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;

    placeObject(selectedItem, x, y);
  });

  function placeObject(item, xPct, yPct) {
    const id = ++objectIdCounter;
    const container = document.getElementById('placed-objects');

    const el = document.createElement('div');
    el.className = 'ar-object';
    el.textContent = item.icon;
    el.dataset.id = id;
    el.style.left = `${xPct}%`;
    el.style.top = `${yPct}%`;
    el.style.transform = 'translate(-50%, -50%)';
    el.title = item.label;

    el.addEventListener('click', (e) => {
      if (removeMode) {
        el.style.transition = 'transform 0.2s, opacity 0.2s';
        el.style.transform = 'translate(-50%,-50%) scale(0)';
        el.style.opacity = '0';
        setTimeout(() => {
          el.remove();
          placedObjects = placedObjects.filter(o => o.id !== id);
          updateCount();
          showToast(`${item.icon} どかしたよ！`);
        }, 200);
        e.stopPropagation();
      }
    });

    container.appendChild(el);
    placedObjects.push({ id, item, x: xPct, y: yPct });
    updateCount();
    updateStatus(`${item.icon} ${item.label} をおいたよ！`);
  }

  // ========================================
  // UTILS
  // ========================================
  function updateCount() {
    document.getElementById('obj-count').textContent = placedObjects.length;
  }

  function updateStatus(msg) {
    document.getElementById('ar-status').textContent = msg;
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function toggleMode() {
    removeMode = !removeMode;
    const label = document.getElementById('mode-label');
    const btn = label.closest('.btn');
    if (removeMode) {
      label.textContent = 'おく';
      btn.style.background = 'linear-gradient(135deg,#ef5350,#c62828)';
      btn.style.color = 'white';
      updateStatus('❌ どかしたいオブジェクトをタップしよう');
      showToast('どかすモードにしたよ');
    } else {
      label.textContent = 'どかす';
      btn.style.background = '';
      btn.style.color = '';
      updateStatus('📍 オブジェクトを選んでタップで配置');
      showToast('おくモードにもどったよ');
    }
  }

  function clearAll() {
    if (placedObjects.length === 0) {
      showToast('まだなにもおいていないよ！');
      return;
    }
    document.getElementById('placed-objects').innerHTML = '';
    placedObjects = [];
    updateCount();
    showToast('ぜんぶきれいにしたよ！');
    updateStatus('📍 オブジェクトを選んでタップで配置');
  }

  function takeScreenshot() {
    if (placedObjects.length === 0) {
      showToast('なにかおいてからさつえいしよう！');
      return;
    }
    captureARView((dataUrl) => {
      openSubmitModal(dataUrl);
    });
  }

  // ========================================
  // PHASE 3 - GALLERY
  // ========================================

  // --- Supabase設定（本番時はここを書き換える）---
  const SUPABASE_URL = '';       // 例: 'https://xxxx.supabase.co'
  const SUPABASE_ANON_KEY = '';  // 例: 'eyJhbGci...'
  const USE_DEMO_MODE = !SUPABASE_URL || !SUPABASE_ANON_KEY;

  // デモ用インメモリストレージ
  let demoWorks = [];
  let demoLikes = {};

  // ===== AR VIEW CAPTURE =====
  function captureARView(callback) {
    const container = document.getElementById('ar-container');
    const canvas = document.createElement('canvas');
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    const ctx = canvas.getContext('2d');

    // ① 背景：カメラON時はvideo映像、OFF時はグラデーション
    const video = document.getElementById('ar-video');
    if (arCameraOn && video.readyState >= 2) {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    } else {
      const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.addColorStop(0, '#1a2a4a');
      bg.addColorStop(0.8, '#2d4a2d');
      bg.addColorStop(1, '#3a5a3a');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // グリッド描画
      ctx.strokeStyle = 'rgba(110,198,245,0.2)';
      ctx.lineWidth = 1;
      const gridSize = 40 * 2;
      for (let x = 0; x < canvas.width; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
    }

    // ② 配置オブジェクトを描画
    const drawPromises = placedObjects.map(obj => new Promise(resolve => {
      const x = (obj.x / 100) * canvas.width;
      const y = (obj.y / 100) * canvas.height;

      if (obj.customDataUrl) {
        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, x - 60, y - 60, 120, 120);
          resolve();
        };
        img.onerror = resolve;
        img.src = obj.customDataUrl;
      } else {
        ctx.font = `${64}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(obj.item.icon, x, y);
        resolve();
      }
    }));

    Promise.all(drawPromises).then(() => {
      callback(canvas.toDataURL('image/jpeg', 0.85));
    });
  }

  // ===== SUBMIT MODAL =====
  function openSubmitModal(dataUrl) {
    document.getElementById('submit-preview-img').src = dataUrl;
    document.getElementById('submit-modal').dataset.dataUrl = dataUrl;
    document.getElementById('submit-modal').classList.add('open');
    document.getElementById('author-name-input').focus();
  }

  function closeSubmitModal() {
    document.getElementById('submit-modal').classList.remove('open');
  }

  async function submitWork() {
    const name = document.getElementById('author-name-input').value.trim();
    if (!name) {
      document.getElementById('author-name-input').style.borderColor = '#e53935';
      setTimeout(() => document.getElementById('author-name-input').style.borderColor = '', 1200);
      showToast('なまえをいれてね！');
      return;
    }

    const dataUrl = document.getElementById('submit-modal').dataset.dataUrl;
    const btn = document.getElementById('submit-btn');
    btn.textContent = '⏳ とうこうちゅう…';
    btn.disabled = true;

    try {
      if (USE_DEMO_MODE) {
        await submitDemoWork(name, dataUrl);
      } else {
        await submitSupabaseWork(name, dataUrl);
      }
      closeSubmitModal();
      showToast(`🎉 ${name}さんのさくひんをとうこうしたよ！`);
      document.getElementById('author-name-input').value = '';
    } catch (e) {
      showToast('とうこうできなかった…もういちどためしてね');
    } finally {
      btn.textContent = '🚀 とうこう！';
      btn.disabled = false;
    }
  }

  // ===== DEMO MODE =====
  async function submitDemoWork(name, dataUrl) {
    await new Promise(r => setTimeout(r, 600)); // simulate network
    demoWorks.unshift({
      id: Date.now(),
      author_name: name,
      screenshot_url: dataUrl,
      likes: 0,
      created_at: new Date().toISOString()
    });
  }

  async function loadDemoWorks() {
    await new Promise(r => setTimeout(r, 400));
    return demoWorks;
  }

  // ===== SUPABASE MODE =====
  async function submitSupabaseWork(name, dataUrl) {
    // Base64をBlobに変換
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const fileName = `${Date.now()}_${name}.jpg`;

    // Storageにアップロード
    const uploadRes = await fetch(
      `${SUPABASE_URL}/storage/v1/object/screenshots/${fileName}`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'image/jpeg',
        },
        body: blob
      }
    );
    if (!uploadRes.ok) throw new Error('upload failed');

    // DBにレコード挿入
    const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/works`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'apikey': SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        author_name: name,
        screenshot_url: fileName,
        likes: 0
      })
    });
    if (!insertRes.ok) throw new Error('insert failed');
  }

  async function loadSupabaseWorks() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/works?select=*&order=created_at.desc`,
      {
        headers: {
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'apikey': SUPABASE_ANON_KEY,
        }
      }
    );
    if (!res.ok) throw new Error('load failed');
    const works = await res.json();
    // 公開URLに変換
    return works.map(w => ({
      ...w,
      screenshot_url: w.screenshot_url.startsWith('data:')
        ? w.screenshot_url
        : `${SUPABASE_URL}/storage/v1/object/public/screenshots/${w.screenshot_url}`
    }));
  }

  // ===== GALLERY MODAL =====
  async function openGallery() {
    document.getElementById('gallery-modal').classList.add('open');
    await loadGallery();
  }

  function closeGallery() {
    document.getElementById('gallery-modal').classList.remove('open');
  }

  async function loadGallery() {
    const grid = document.getElementById('gallery-grid');
    const countEl = document.getElementById('gallery-count');
    grid.innerHTML = '<div class="gallery-loading">⏳</div>';

    try {
      const works = USE_DEMO_MODE
        ? await loadDemoWorks()
        : await loadSupabaseWorks();

      grid.innerHTML = '';
      countEl.textContent = USE_DEMO_MODE
        ? `${works.length} けん（デモモード）`
        : `${works.length} けんのさくひん`;

      if (works.length === 0) {
        grid.innerHTML = '<div class="gallery-empty">まださくひんがないよ。<br>さいしょのひとになろう！🌟</div>';
        return;
      }

      works.forEach((work, i) => {
        const card = createGalleryCard(work, i);
        grid.appendChild(card);
      });
    } catch (e) {
      grid.innerHTML = '<div class="gallery-empty">よみこめなかった…😢</div>';
    }
  }

  function createGalleryCard(work, index) {
    const card = document.createElement('div');
    card.className = 'gallery-card';
    card.style.animationDelay = `${index * 0.06}s`;

    const likeKey = `like_${work.id}`;
    const isLiked = !!demoLikes[likeKey];
    const likeCount = (work.likes || 0) + (isLiked ? 1 : 0);

    card.innerHTML = `
      <img class="gallery-card-img" src="${work.screenshot_url}" alt="${work.author_name}のさくひん"
           onerror="this.style.background='#e0e0e0';this.style.padding='20px'" />
      <div class="gallery-card-footer">
        <div class="gallery-card-name">👤 ${work.author_name}</div>
        <button class="gallery-card-like ${isLiked ? 'liked' : ''}"
                onclick="toggleLike(this, '${work.id}', ${work.likes || 0})">
          ${isLiked ? '❤️' : '🤍'} ${likeCount}
        </button>
      </div>
    `;
    return card;
  }

  function toggleLike(btn, workId, baseLikes) {
    const likeKey = `like_${workId}`;
    demoLikes[likeKey] = !demoLikes[likeKey];
    const isLiked = demoLikes[likeKey];
    const count = baseLikes + (isLiked ? 1 : 0);
    btn.innerHTML = `${isLiked ? '❤️' : '🤍'} ${count}`;
    btn.classList.toggle('liked', isLiked);
    btn.style.transform = 'scale(1.4)';
    setTimeout(() => btn.style.transform = '', 200);
  }

  // ========================================
  // AR CAMERA
  // ========================================
  let arCameraStream = null;
  let arCameraOn = false;

  async function toggleARCamera() {
    if (arCameraOn) {
      stopARCamera();
    } else {
      await startARCamera();
    }
  }

  async function startARCamera() {
    try {
      arCameraStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'environment', // 背面カメラ優先
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });
      const video = document.getElementById('ar-video');
      video.srcObject = arCameraStream;
      video.style.display = 'block';

      // カメラON時は背景canvasを非表示
      document.getElementById('ar-canvas').style.display = 'none';
      // グリッドを薄くする
      document.getElementById('ar-grid').style.opacity = '0.25';

      arCameraOn = true;
      const btn = document.getElementById('ar-camera-btn');
      btn.textContent = '📷 カメラOFF';
      btn.classList.add('active');
      updateStatus('📍 オブジェクトを選んでタップで配置');
      showToast('📷 カメラがONになったよ！');
    } catch (err) {
      if (err.name === 'NotAllowedError') {
        showToast('カメラの許可が必要だよ。ブラウザの設定を確認してね');
      } else {
        showToast('カメラをひらけなかったよ…');
      }
    }
  }

  function stopARCamera() {
    if (arCameraStream) {
      arCameraStream.getTracks().forEach(t => t.stop());
      arCameraStream = null;
    }
    const video = document.getElementById('ar-video');
    video.srcObject = null;
    video.style.display = 'none';

    document.getElementById('ar-canvas').style.display = 'block';
    document.getElementById('ar-grid').style.opacity = '';

    arCameraOn = false;
    const btn = document.getElementById('ar-camera-btn');
    btn.textContent = '📷 カメラON';
    btn.classList.remove('active');
    updateStatus('📷 カメラをONにしよう');
    showToast('カメラをOFFにしたよ');
  }

  // ========================================
  // PHASE 2 - DRAW MODAL
  // ========================================
  let drawCtx, drawCanvas;
  let isDrawing = false;
  let currentColor = '#222';
  let currentSize = 4;
  let isEraser = false;
  let cameraStream = null;
  let processedImageDataUrl = null;

  function openDrawModal() {
    document.getElementById('draw-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
    initDrawCanvas();
  }

  function closeDrawModal() {
    document.getElementById('draw-modal').classList.remove('open');
    document.body.style.overflow = '';
    stopCamera();
  }

  // Close on backdrop click
  document.getElementById('draw-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('draw-modal')) closeDrawModal();
  });

  function switchModalTab(tab, btn) {
    document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.modal-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
    if (tab === 'preview') updatePreview();
  }

  // ===== DRAWING CANVAS =====
  function initDrawCanvas() {
    drawCanvas = document.getElementById('draw-canvas');
    drawCtx = drawCanvas.getContext('2d');
    drawCtx.fillStyle = 'white';
    drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
    drawCtx.lineCap = 'round';
    drawCtx.lineJoin = 'round';

    // Mouse events
    drawCanvas.addEventListener('mousedown', startDraw);
    drawCanvas.addEventListener('mousemove', draw);
    drawCanvas.addEventListener('mouseup', endDraw);
    drawCanvas.addEventListener('mouseleave', endDraw);

    // Touch events
    drawCanvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e.touches[0]); }, { passive: false });
    drawCanvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e.touches[0]); }, { passive: false });
    drawCanvas.addEventListener('touchend', endDraw);
  }

  function getCanvasPos(e) {
    const rect = drawCanvas.getBoundingClientRect();
    const scaleX = drawCanvas.width / rect.width;
    const scaleY = drawCanvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function startDraw(e) {
    isDrawing = true;
    const pos = getCanvasPos(e);
    drawCtx.beginPath();
    drawCtx.moveTo(pos.x, pos.y);
  }

  function draw(e) {
    if (!isDrawing) return;
    const pos = getCanvasPos(e);
    drawCtx.lineWidth = isEraser ? currentSize * 4 : currentSize;
    drawCtx.strokeStyle = isEraser ? 'white' : currentColor;
    drawCtx.lineTo(pos.x, pos.y);
    drawCtx.stroke();
  }

  function endDraw() { isDrawing = false; }

  function setColor(el) {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    if (el.dataset.color === 'eraser') {
      isEraser = true;
    } else {
      isEraser = false;
      currentColor = el.dataset.color;
    }
  }

  function setSize(el) {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentSize = parseInt(el.dataset.size);
  }

  function clearDrawCanvas() {
    drawCtx.fillStyle = 'white';
    drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
    showToast('きれいにしたよ！');
  }

  // ===== PROCESS DRAWING → TRANSPARENT PNG =====
  function processDrawing() {
    const sourceCanvas = document.getElementById('draw-canvas');
    removeWhiteBackground(sourceCanvas, (resultDataUrl) => {
      processedImageDataUrl = resultDataUrl;
      showToast('✨ できたよ！かくにんタブでみてね');
      // Auto switch to preview
      const tabs = document.querySelectorAll('.modal-tab');
      switchModalTab('preview', tabs[2]);
    });
  }

  function removeWhiteBackground(sourceCanvas, callback) {
    const offscreen = document.createElement('canvas');
    offscreen.width = sourceCanvas.width;
    offscreen.height = sourceCanvas.height;
    const ctx = offscreen.getContext('2d');
    ctx.drawImage(sourceCanvas, 0, 0);

    const imageData = ctx.getImageData(0, 0, offscreen.width, offscreen.height);
    const data = imageData.data;
    const threshold = 230;

    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i+1], b = data[i+2];
      if (r > threshold && g > threshold && b > threshold) {
        data[i+3] = 0; // transparent
      }
    }
    ctx.putImageData(imageData, 0, 0);
    callback(offscreen.toDataURL('image/png'));
  }

  // ===== CAMERA =====
  async function startCamera() {
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      const video = document.getElementById('camera-video');
      video.srcObject = cameraStream;
      document.getElementById('camera-start-btn').textContent = '✅ カメラON';
      document.getElementById('camera-capture-btn').disabled = false;
      showToast('カメラがひらいたよ！');
    } catch (err) {
      showToast('カメラがつかえないよ。かわりにかいてね');
    }
  }

  function capturePhoto() {
    const video = document.getElementById('camera-video');
    const canvas = document.getElementById('camera-canvas');
    canvas.width = video.videoWidth || 400;
    canvas.height = video.videoHeight || 300;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    removeWhiteBackground(canvas, (resultDataUrl) => {
      processedImageDataUrl = resultDataUrl;
      stopCamera();
      showToast('📷 とれたよ！かくにんタブでみてね');
      const tabs = document.querySelectorAll('.modal-tab');
      switchModalTab('preview', tabs[2]);
    });
  }

  function stopCamera() {
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
    }
    document.getElementById('camera-start-btn').textContent = '📷 カメラをひらく';
    document.getElementById('camera-capture-btn').disabled = true;
  }

  // ===== PREVIEW =====
  function updatePreview() {
    const previewCanvas = document.getElementById('preview-canvas');
    const hint = document.getElementById('preview-hint');
    const addBtn = document.getElementById('add-to-ar-btn');

    if (!processedImageDataUrl) {
      hint.textContent = 'まだなにもないよ。かくかしゃしんをとってね！';
      addBtn.disabled = true;
      return;
    }

    const ctx = previewCanvas.getContext('2d');
    ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    const img = new Image();
    img.onload = () => {
      // Fit into preview canvas
      const scale = Math.min(
        previewCanvas.width / img.width,
        previewCanvas.height / img.height
      );
      const w = img.width * scale;
      const h = img.height * scale;
      const x = (previewCanvas.width - w) / 2;
      const y = (previewCanvas.height - h) / 2;
      ctx.drawImage(img, x, y, w, h);
    };
    img.src = processedImageDataUrl;
    hint.textContent = 'はくけい（白）をとうめいにしたよ！';
    addBtn.disabled = false;
  }

  // ===== ADD CUSTOM OBJECT TO AR =====
  function addCustomToAR() {
    if (!processedImageDataUrl) return;

    // Place at center of AR view
    const x = 35 + Math.random() * 30;
    const y = 25 + Math.random() * 40;
    placeCustomObject(processedImageDataUrl, x, y);
    closeDrawModal();
    showToast('🎉 じぶんのえをARにおいたよ！');
    processedImageDataUrl = null;
  }

  function placeCustomObject(dataUrl, xPct, yPct) {
    const id = ++objectIdCounter;
    const container = document.getElementById('placed-objects');

    const el = document.createElement('div');
    el.className = 'ar-object';
    el.dataset.id = id;
    el.style.left = `${xPct}%`;
    el.style.top = `${yPct}%`;
    el.style.transform = 'translate(-50%, -50%)';
    el.style.fontSize = '0';

    const img = document.createElement('img');
    img.src = dataUrl;
    img.style.cssText = `
      width: 60px;
      height: 60px;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
      display: block;
    `;
    el.appendChild(img);

    el.addEventListener('click', (e) => {
      if (removeMode) {
        el.style.transition = 'transform 0.2s, opacity 0.2s';
        el.style.transform = 'translate(-50%,-50%) scale(0)';
        el.style.opacity = '0';
        setTimeout(() => {
          el.remove();
          placedObjects = placedObjects.filter(o => o.id !== id);
          updateCount();
          showToast('どかしたよ！');
        }, 200);
        e.stopPropagation();
      }
    });

    container.appendChild(el);
    placedObjects.push({ id, item: { icon: '🎨', label: 'マイえ' }, x: xPct, y: yPct, customDataUrl: dataUrl });
    updateCount();
    updateStatus('🎨 じぶんのえをおいたよ！');
  }

  // ========================================
  // INIT
  // ========================================
  renderPalette('town');
</script>
</body>
